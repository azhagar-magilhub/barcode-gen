      html += '</div>';
      if (c.kind === 'weight') {
        var dollars = Math.max(0, (item.price || 0) * (qty || 1));
        html += '<div><span class="key">scan adds:</span> ' + (qty || 1).toFixed(3) + ' ' + unitLabel +
                ' @ embedded $' + dollars.toFixed(2) + '</div>';
      } else if (c.kind === 'fixed' || c.kind === 'fixed-alpha') {
        html += '<div><span class="key">scan adds:</span> qty 1 @ menu price' +
                ((qty | 0) > 1 ? ' <span style="color:#a00">(qty&gt;1 not encoded for fixed-price; cart adds 1 per scan)</span>' : '') +
                '</div>';
        html += '<div><span class="key">type:</span> <code>' + type + '</code></div>';
        // Warn when alphanumeric SKU is rendered in a numeric format — the
        // generated barcode will not match the original menu itemCode on scan.
        if (c.kind === 'fixed-alpha' && type !== 'CODE128') {
          var digits = String(item.itemCode).replace(/\D/g, '');
          html += '<div style="color:#a00;margin-top:4px">Warning: numeric encoding of an alphanumeric itemCode. Scanned value will be a digits-only form (<code>' +
                  (digits || '(none)') + '</code>) and will not match the original itemCode <code>' + item.itemCode + '</code> in your menu.</div>';
        }
      }
      meta.innerHTML = html;
    }

    function renderCard(item) {
      var c = classify(item);
      var allowed = allowedTypes(item, c);
      var initialType = c.kind === 'fixed' ? 'EAN13' : c.kind === 'fixed-alpha' ? 'CODE128' : 'EAN13';

      var card = el('div', {
        class: 'card',
        'data-cat': item.category || '(uncategorized)',
        'data-name': (item.itemName || '').toLowerCase(),
        'data-code': item.itemCode.toLowerCase(),
        'data-weight': item.isWeightBased ? '1' : '0',
        'data-age': item.isAgeRestricted ? '1' : '0',
        'data-supported': (c.kind === 'fixed' || c.kind === 'weight' || c.kind === 'fixed-alpha') ? '1' : '0',
        'data-class': c.kind
      });

      // Title row: title-block (h3 + sub) on the left, badges glued top-right.
      var head = el('div', {class: 'card-head'});
      var titleBlock = el('div', {class: 'title-block'});
      titleBlock.appendChild(el('h3', {text: item.itemName || '(unnamed)'}));
      titleBlock.appendChild(el('div', {class: 'sub', text: (item.category || '--') + (item.subCategory ? ' / ' + item.subCategory : '')}));
      head.appendChild(titleBlock);

      var badges = el('div', {class: 'badges'});
      if (c.kind === 'weight') badges.appendChild(el('span', {class: 'badge weight', text: 'weight / GS1'}));
      else if (c.kind === 'fixed') badges.appendChild(el('span', {class: 'badge fp', text: 'fixed-price'}));
      else if (c.kind === 'fixed-alpha') badges.appendChild(el('span', {class: 'badge unsup', text: 'Alphanumeric'}));
      else if (c.kind === 'fixed-too-long') badges.appendChild(el('span', {class: 'badge unsup', text: 'too long'}));
      else if (c.kind === 'weight-bad') badges.appendChild(el('span', {class: 'badge unsup', text: 'PLU invalid'}));
      else if (c.kind === 'weight-zero-price') badges.appendChild(el('span', {class: 'badge zerop', text: 'price = 0'}));
      if (item.isAgeRestricted) badges.appendChild(el('span', {class: 'badge age', text: 'age' + (item.minimumAge ? ' ' + item.minimumAge + '+' : '')}));
      if (!(item.price > 0) && c.kind !== 'weight-zero-price') badges.appendChild(el('span', {class: 'badge zerop', text: 'price 0'}));
      head.appendChild(badges);
      card.appendChild(head);

      var ctrl = el('div', {class: 'card-controls'});
      var typeSel = null, qtyInput = null;
      if (c.kind === 'fixed' || c.kind === 'weight' || c.kind === 'fixed-alpha') {
        var typeField = el('div', {class: 'field'});
        typeField.appendChild(el('span', {text: 'Type:'}));
        typeSel = el('select', {'data-role': 'type'});
        allowed.forEach(function (t) {
          var label = t === 'EAN13' ? 'EAN-13' : t === 'UPCA' ? 'UPC-A' : t === 'EAN8' ? 'EAN-8' : t === 'UPCE' ? 'UPC-E' : t === 'CODE128' ? 'Code128' : t;
          var opt = el('option', {value: t, text: label});
          if (t === initialType) opt.setAttribute('selected', 'selected');
          typeSel.appendChild(opt);
        });
        if (allowed.length === 1) typeSel.disabled = true;
        typeField.appendChild(typeSel);
        if (c.kind === 'weight') typeField.appendChild(el('span', {class: 'lock', text: '(GS1 fixes EAN-13)'}));
        if (c.kind === 'fixed-alpha') typeField.appendChild(el('span', {class: 'lock', text: '(Code128 default; numeric formats strip letters)'}));
        ctrl.appendChild(typeField);

        var qtyField = el('div', {class: 'field'});
        qtyField.appendChild(el('span', {text: c.kind === 'weight' ? ('Qty (' + (item.priceUnit || 'units') + '):') : 'Unit:'}));
        var qtyAttrs = c.kind === 'weight'
          ? {type: 'number', min: '0.001', step: '0.001', value: '1', 'data-role': 'qty'}
          : {type: 'number', min: '1', step: '1', value: '1', 'data-role': 'qty', inputmode: 'numeric'};
        qtyInput = el('input', qtyAttrs);
        qtyField.appendChild(qtyInput);
        if (c.kind !== 'weight') qtyField.appendChild(el('span', {class: 'lock', text: '(integer; cart adds qty 1 per scan)'}));
        ctrl.appendChild(qtyField);
      }
      card.appendChild(ctrl);

      var box = el('div', {class: 'barcode-box'});
      card.appendChild(box);
      var meta = el('div', {class: 'meta-row'});
      card.appendChild(meta);

      function rerender() {
        var t = (typeSel && typeSel.value) || initialType;
        var q;
        if (c.kind === 'weight') {
          q = qtyInput && qtyInput.valueAsNumber;
          if (!isFinite(q) || q <= 0) q = 1;
        } else {
          q = qtyInput && parseInt(qtyInput.value, 10);
          if (!isFinite(q) || q < 1) q = 1;
        }
        renderInto(box, item, t, q);
        updateMetaRow(meta, item, t, q);
      }
      if (typeSel) typeSel.addEventListener('change', rerender);
      if (qtyInput) {
        qtyInput.addEventListener('input', rerender);
        if (c.kind !== 'weight') {
          qtyInput.addEventListener('blur', function () {
            var v = parseInt(qtyInput.value, 10);
            if (!isFinite(v) || v < 1) v = 1;
            qtyInput.value = String(v);
            rerender();
          });
        }
      }
      rerender();
      return card;
    }

    var root = document.getElementById('root');
    var byCat = {};
    MENU.forEach(function (it) {
      var k = it.category || '(uncategorized)';
      (byCat[k] = byCat[k] || []).push(it);
    });
    var cats = Object.keys(byCat).sort(function (a, b) { return a.localeCompare(b); });

    var catSel = document.getElementById('categoryFilter');
    cats.forEach(function (cat) {
      catSel.appendChild(el('option', {value: cat, text: cat + ' (' + byCat[cat].length + ')'}));
    });
    cats.forEach(function (cat) {
      root.appendChild(el('h2', {class: 'cat', text: cat + ' / ' + byCat[cat].length + ' items'}));
      var grid = el('div', {class: 'grid', 'data-cat': cat});
      byCat[cat].forEach(function (it) { grid.appendChild(renderCard(it)); });
      root.appendChild(grid);
    });

    function applyFilters() {
      var q = document.getElementById('search').value.trim().toLowerCase();
      var cat = document.getElementById('categoryFilter').value;
      var onlyW = document.getElementById('onlyWeight').checked;
      var onlyA = document.getElementById('onlyAge').checked;
      var hideU = document.getElementById('hideUnsupported').checked;
      var visible = 0;
      var cards = document.querySelectorAll('.card');
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        var match = true;
        if (q && c.dataset.name.indexOf(q) < 0 && c.dataset.code.toLowerCase().indexOf(q) < 0) match = false;
        if (cat && c.dataset.cat !== cat) match = false;
        if (onlyW && c.dataset.weight !== '1') match = false;
        if (onlyA && c.dataset.age !== '1') match = false;
        if (hideU && c.dataset.supported !== '1') match = false;
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      }
      var grids = document.querySelectorAll('.grid');
      grids.forEach(function (g) {
        var any = g.querySelectorAll('.card:not(.hidden)').length > 0;
        g.style.display = any ? '' : 'none';
        if (g.previousElementSibling && g.previousElementSibling.classList.contains('cat')) {
          g.previousElementSibling.style.display = any ? '' : 'none';
        }
      });
      document.getElementById('visibleCount').textContent = visible + ' / ' + MENU.length + ' visible';
    }

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('categoryFilter').addEventListener('change', applyFilters);
    document.getElementById('onlyWeight').addEventListener('change', applyFilters);
    document.getElementById('onlyAge').addEventListener('change', applyFilters);
    document.getElementById('hideUnsupported').addEventListener('change', applyFilters);
    document.getElementById('applyDefault').addEventListener('click', function () {
      var t = document.getElementById('defaultType').value;
      var cards = document.querySelectorAll('.card[data-class=fixed]');
      for (var i = 0; i < cards.length; i++) {
        var sel = cards[i].querySelector('[data-role=type]');
        if (sel && !sel.disabled) { sel.value = t; sel.dispatchEvent(new Event('change')); }
      }
    });

    applyFilters();
  })();
  </script>
</body>
</html>
